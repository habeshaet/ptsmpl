    <style>
        body, html {
            margin: 0;

            height: 100%;
            width: 100%;
            overflow: hidden;
            /* Ethiopian Airlines Theme Gradient */
            background: linear-gradient(135deg, #006341 0%, #13294B 100%);
        }
        
        /* Logo placed in the center of the background */
        .background-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; /* Adjust size as needed */
            opacity: 0.3; /* Subtle watermark effect */
            z-index: -1;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: transparent; /* Allows gradient to show if frame is transparent */
        }
    </style>
